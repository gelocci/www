    <meta charset="UTF-8">
    <title>Gelocci - Cálculo de Opções Black-Scholes</title>
    <link rel="stylesheet" href="../../assets/css/animate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,w
    ght@1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/globals.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/forms.css">
    <link rel="stylesheet" href="../../assets/css/form-bs.css">
    <link rel="stylesheet" href="../../assets/css/footer.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="icon" href="../../assets/imagens/favicon.ico" type="image/x-icon">
    <meta name="description" content="Calculadora de preço de opções baseada no modelo Black and Scholes.">
    <meta name="keywords" content="taxa, conversão, juros, financeiro, calculadora, black and scholes">
    <meta name="author" content="Gerson Locci">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
</head>
<body>
    <header>
        <h1 class="fadeInDown" data-anime="200">Precificação de Opções - Black-Scholes</h1>
        <h2 class="fadeInUp" data-anime="200">gelocci.com.br</h2>
    </header>
    <nav class="navegacao">
        <ul>
            <li><a href="../../index.html" class="inicio">Início</a></li>
            <li><a href="../../quem-somos/index.html">Quem Somos</a></li>
            <li><a href="../../politica-de-privacidade/index.html">Política de Privacidade</a></li>
            <li><a href="../../termos-de-uso/index.html">Termos de Uso</a></li>
            <li><a href="../../contato/index.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section class="calculator" data-anime="200">
            <form id="blackScholesForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="currentPrice">Preço Atual do Ativo:</label>
                        <input type="text" id="currentPrice" name="currentPrice" placeholder="Ex: 100,00">
                    </div>
                    <div class="form-group">
                        <label for="strikePrice">Preço de Exercício (Strike):</label>
                        <input type="text" id="strikePrice" name="strikePrice" placeholder="Ex: 100,00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="timeToMaturity">Data de Vencimento:</label>
                        <input type="date" id="timeToMaturity" name="timeToMaturity" required>
                    </div>
                    <div class="form-group">
                        <label for="interestRate">Taxa de Juros Anual (%):</label>
                        <input type="text" id="interestRate" name="interestRate" placeholder="Ex: 5">
                    </div>
                    <div class="form-group">
                        <label for="volatility">Volatilidade (%):</label>
                        <input type="text" id="volatility" name="volatility" placeholder="Ex: 20">
                    </div>
                </div>
                <div class="form-group">
                    <button type="button" id="calculateButton">Calcular</button>
                </div>
            </form>

            <!-- Tabela para exibir os resultados -->
            <div id="result">
                <h3>Resultados:</h3>
                <table class="taxa-table">
                    <thead>
                        <tr>
                            <th>Tipo de Opção</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Preço da Call</td>
                            <td id="callPrice"><span id="callValue"></span></td>
                        </tr>
                        <tr>
                            <td>Preço da Put</td>
                            <td id="putPrice"><span id="putValue"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../plugins/simple-anime.js"></script>
    <script src="../../assets/js/load-footer.js" defer></script>
    <script src="./js/black-scholes.js" defer></script>
</body>
</html>
