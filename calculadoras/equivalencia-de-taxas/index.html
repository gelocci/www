<body>

<div id="site-header"></div>

<div class="page-header">
  <div class="page-eyebrow"><div class="eyebrow-line"></div>Calculadora</div>
  <h1>Equivalência<br>de <em>Taxas</em></h1>
  <p>Informe uma taxa e seu período — veja instantaneamente os equivalentes em todos os outros períodos, tanto em juros simples quanto compostos.</p>
</div>

<div class="calc-wrapper">
  <div class="form-card">
    <div class="form-card-title">Parâmetros da conversão</div>
    <div class="form-grid">
      <div class="form-group">
        <label for="rateInput">Taxa (%)</label>
        <input type="number" id="rateInput" name="rateInput" required placeholder="Ex: 1,5" step="0.01" min="0">
        <span class="form-hint">Digite a taxa que você quer converter</span>
      </div>
      <div class="form-group">
        <label for="periodSelect">Período da taxa</label>
        <select id="periodSelect" name="periodSelect">
          <option value="monthly">Mensal</option>
          <option value="quarterly">Trimestral</option>
          <option value="semiannual">Semestral</option>
          <option value="annual">Anual</option>
        </select>
        <span class="form-hint">Selecione o período da taxa informada</span>
      </div>
    </div>
    <button type="button" class="btn-calc" onclick="converterTaxa()">Converter →</button>
    <button class="btn-share" id="btnShare" onclick="compartilharURL()" style="display:none;margin-top:1rem;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartilhar
    </button>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-card-header">
      <div class="results-card-title">Taxas equivalentes</div>
      <div class="results-card-sub" id="resultsCardSub"></div>
    </div>
    <div id="result"></div>
  </div>
</div>

<div id="site-footer"></div>

<script>
</script>

<script>
function pushStateFromForm() {
  var params = new URLSearchParams({
    taxa:    document.getElementById('rateInput').value || '',
    periodo: document.getElementById('periodSelect').value
  });
  history.replaceState(null, '', '?' + params.toString());
}

function loadFromURL() {
  var params = new URLSearchParams(window.location.search);
  if (!params.has('taxa')) return false;
  var taxa = params.get('taxa');
  var periodo = params.get('periodo');
  if (taxa)    document.getElementById('rateInput').value = taxa;
  if (periodo) document.getElementById('periodSelect').value = periodo;
  return true;
}

function compartilharURL() {
  var url = window.location.href;
  var btn = document.getElementById('btnShare');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      var original = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(function() { btn.innerHTML = original; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    });
  } else {
    prompt('Copie a URL abaixo:', url);
  }
}

// Inicialização
document.addEventListener('DOMContentLoaded', function() {
  if (loadFromURL()) {
    converterTaxa();
  }
});

function converterTaxa(){
  var taxa=parseFloat(document.getElementById('rateInput').value.replace(',','.'));
  var periodo=document.getElementById('periodSelect').value;
  var resultDiv=document.getElementById('result');
  var resultsCard=document.getElementById('resultsCard');
  var periodoNome={monthly:'Mensal',quarterly:'Trimestral',semiannual:'Semestral',annual:'Anual'};

  if(!isNaN(taxa)&&taxa>0){
    let resultadoHTML='';
    resultadoHTML+=`
      <table class="taxa-table">
        <thead>
          <tr>
            <th>Tipo de Juros</th>
            <th>Mensal</th>
            <th>Trimestral</th>
            <th>Semestral</th>
            <th>Anual</th>
          </tr>
        </thead>
        <tbody>
    `;

    switch(periodo){
      case 'monthly': resultadoHTML+=gerarLinhas(taxa,[1,3,6,12]); break;
      case 'quarterly': resultadoHTML+=gerarLinhas(taxa,[1/3,1,2,4]); break;
      case 'semiannual': resultadoHTML+=gerarLinhas(taxa,[1/6,1/2,1,2]); break;
      case 'annual': resultadoHTML+=gerarLinhas(taxa,[1/12,1/4,1/2,1]); break;
    }

    resultadoHTML+=`</tbody></table>`;
    resultDiv.innerHTML='<div class="table-scroll">'+resultadoHTML+'</div>';

    document.getElementById('resultsCardSub').textContent=`Taxa de entrada: ${taxa.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}% ao ${periodoNome[periodo].toLowerCase()}`;
    resultsCard.style.display='block';
    pushStateFromForm();
    document.getElementById('btnShare').style.display='inline-flex';

    // Salvar no histórico
    (function(entrada) {
      if (window.gelocciSalvarSimulacao) { gelocciSalvarSimulacao(entrada); }
      else { window._gelocciHistFila = window._gelocciHistFila || []; window._gelocciHistFila.push(entrada); }
    })({
      calculadora: 'Equivalência de Taxas',
      valor: taxa.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) + '% ' + ({monthly:'mensal',quarterly:'trimestral',semiannual:'semestral',annual:'anual'})[periodo],
      params: 'Conversão de taxa ' + ({monthly:'mensal',quarterly:'trimestral',semiannual:'semestral',annual:'anual'})[periodo],
      url: window.location.href
    });

    const offset=resultsCard.getBoundingClientRect().top+window.scrollY-80;
    window.scrollTo({top:offset,behavior:'smooth'});
  } else {
    alert('Por favor, insira uma taxa válida.');
  }
}

function gerarLinhas(taxa,periodos){
  return `
    <tr>
      <td class="tipo">Juros Simples</td>
      <td><span class="highlight">${jurosSimples(taxa,periodos[0])}</span>%</td>
      <td><span class="highlight">${jurosSimples(taxa,periodos[1])}</span>%</td>
      <td><span class="highlight">${jurosSimples(taxa,periodos[2])}</span>%</td>
      <td><span class="highlight">${jurosSimples(taxa,periodos[3])}</span>%</td>
    </tr>
    <tr>
      <td class="tipo">Juros Compostos</td>
      <td><span class="highlight">${jurosCompostos(taxa,periodos[0])}</span>%</td>
      <td><span class="highlight">${jurosCompostos(taxa,periodos[1])}</span>%</td>
      <td><span class="highlight">${jurosCompostos(taxa,periodos[2])}</span>%</td>
      <td><span class="highlight">${jurosCompostos(taxa,periodos[3])}</span>%</td>
    </tr>
  `;
}

function jurosSimples(taxa,periodo){return formatarDecimal(taxa*periodo);}
function jurosCompostos(taxa,periodo){return formatarDecimal(((Math.pow(1+taxa/100,periodo))-1)*100);}
function formatarDecimal(numero){
  return new Intl.NumberFormat('pt-BR',{style:'decimal',minimumFractionDigits:2,maximumFractionDigits:2}).format(numero);
}
</script>

<script src="/assets/js/components.js"></script>
</body>
