<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <title>Gelocci - Cálculo de Juros Compostos</title>
    <link rel="stylesheet" href="../../assets/css/animate.css">
    <link rel="stylesheet" href="../../assets/css/globals.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/forms.css">
    <link rel="stylesheet" href="../../assets/css/form-calculator.css">
    <link rel="stylesheet" href="../../assets/css/footer.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="icon" href="../../assets/imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="Calcule o crescimento do seu investimento com nossa calculadora avançada de juros compostos.">
    <meta name="keywords" content="juros compostos, finanças, investimento, calculadora, aposentadoria">
    <meta name="author" content="Gerson Locci">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
</head>
<body>
    <header>
        <h1 class="fadeInDown" data-anime="200">Calculadora Avançada de Juros Compostos</h1>
        <h2 class="fadeInUp" data-anime="200">gelocci.com.br</h2>
    </header>
    <nav class="navegacao">
        <ul>
            <li><a href="../../index.html" class="inicio">Início</a></li>
            <li><a href="../../quem-somos/index.html">Quem Somos</a></li>
            <li><a href="../../politica-de-privacidade/index.html">Política de Privacidade</a></li>
            <li><a href="../../termos-de-uso/index.html">Termos de Uso</a></li>
            <li><a href="../../contato/index.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section class="calculator" data-anime="200">
            <div class="form-container">
                <form id="advancedCompoundInterestForm" class="form-calculator">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="initialDeposit">Aporte Inicial (R$):</label>
                            <input type="text" id="initialDeposit" name="initialDeposit" min="0" step="0.01" autofocus placeholder="Ex: 10.000,00">
                        </div>
                        <div class="form-group">
                            <label for="monthlyContribution">Contribuição Mensal (R$):</label>
                            <input type="text" id="monthlyContribution" name="monthlyContribution" min="0" step="0.01" required placeholder="Ex: 500,00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="monthlyInterest">Juros Mensais (%):</label>
                            <input type="text" id="monthlyInterest" name="monthlyInterest" min="0" step="0.01" required placeholder="Ex: 1,50">
                        </div>
                        <div class="form-group">
                            <label for="inflation">Média Anual da Inflação (%):</label>
                            <input type="text" id="inflation" name="inflation" min="0" step="0.01" placeholder="Ex: 0,50">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="period">Período em Anos:</label>
                            <input type="text" id="period" name="period" min="1" step="1" required placeholder="Ex: 10">
                        </div>
                        <div class="form-group">
                            <label for="include13th">Considerar 13º Salário:</label>
                            <select id="include13th" name="include13th">
                                <option value="yes">Sim</option>
                                <option value="no" selected>Não</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="calculateButton">Calcular</button>
                    </div>
                </form>
    
                <div id="result" class="resultado">
                    <!-- Resultados serão exibidos aqui -->
                </div>
                
            </div>
            <div class="chart-container">

                <canvas id="investmentChart"> </canvas> <!-- Gráfico -->
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../assets/js/load-footer.js" defer></script>
    <script src="js/calculo-juros-avancado.js" defer></script>

    <script>
        // Aplicando a máscara de formatação nos campos
        $(document).ready(function() {
            $('#initialDeposit').mask('000.000.000.000.000,00', {reverse: true});
            $('#monthlyContribution').mask('000.000.000.000.000,00', {reverse: true});
            $('#monthlyInterest').mask('0,00', {reverse: true});
            $('#inflation').mask('0,00', {reverse: true});
            $('#period').mask('000', {reverse: true}); // Aplicando máscara também ao período
        });
    </script>
    <script src="../../plugins/simple-anime.js"></script>
</body>
</html>
