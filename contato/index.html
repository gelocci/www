<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <title>Gelocci - Contato</title>
    <link rel="stylesheet" href="../assets/css/animate.css">
	<link rel="stylesheet" href="../assets/css/globals.css">
    <link rel="stylesheet" href="../assets/css/header.css">
	<link rel="stylesheet" href="../assets/css/main.css">
	<link rel="stylesheet" href="../assets/css/forms.css">
	<link rel="stylesheet" href="../assets/css/form-contact.css"> <!-- CSS específico para a página de contato -->
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="icon" href="../assets/imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="Entre em contato com a gelocci.com.br para dúvidas, sugestões ou suporte.">
    <meta name="keywords" content="contato, suporte, dúvidas, gelocci, finanças">
    <meta name="author" content="Gerson Locci">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="../assets/js/load-footer.js" defer></script>
    <script>document.documentElement.classList.add('js')</script>
</head>
<body class="contato-page">
    <header>
        <h1 class="fadeInDown" data-anime="200">Contato</h1>
        <h2 class="fadeInUp" data-anime="200">gelocci.com.br</h2>
    </header>
    <nav class="navegacao">
        <ul>
            <li><a href="../index.html" class="inicio">Início</a></li>
            <li><a href="../quem-somos/index.html">Quem Somos</a></li>
            <li><a href="../politica-de-privacidade/index.html">Política de Privacidade</a></li>
            <li><a href="../termos-de-uso/index.html">Termos de Uso</a></li>
            <li><a href="../contato/index.html" aria-current="page">Contato</a></li>
        </ul>
    </nav>
    <main>
        <section class="contact-form" data-anime="200">
            <form action="/success.html" method="POST" netlify-honeypot="bot-field" data-netlify="true" data-netlify-recaptcha="true">
                <div>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                </div>
                <div>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Seu melhor e-mail" required>
                </div>
                <div>
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Como podemos ajudar?" rows="6" required></textarea>
                </div>
                <div class="recaptcha">
					<div data-netlify-recaptcha="true"></div>
				</div>
                <div class="hidden">
                    <label>Não preencha este campo se você for humano: <input name="bot-field"></label>
                </div>
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>
	
    <!-- Placeholder para o footer -->
    <div id="footer-placeholder"></div>
    <script src="../plugins/simple-anime.js"></script>
</body>
</html>
