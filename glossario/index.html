<style>
:root{--green:#00C853;--green-dim:#00A844;--green-glow:rgba(0,200,83,0.12);--green-border:rgba(0,200,83,0.22);--gold:#C9A84C;--bg:#080B0A;--bg-2:#0E1412;--bg-card:#111815;--bg-hover:#141C18;--white:#F0F4F2;--muted-1:rgba(240,244,242,0.65);--muted-2:rgba(240,244,242,0.40);--muted-3:rgba(240,244,242,0.12);--muted-4:rgba(240,244,242,0.05);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4;}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2.5rem;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,11,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--muted-3);}
.logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;color:var(--white);letter-spacing:-0.5px;display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
.logo-dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green);}50%{opacity:0.6;box-shadow:0 0 16px var(--green);}}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:var(--muted-1);text-decoration:none;font-size:0.875rem;transition:color 0.2s;}
.nav-links a:hover{color:var(--white);}
.nav-back{color:var(--muted-1);text-decoration:none;font-size:0.875rem;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;}
.nav-back:hover{color:var(--white);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:transform 0.25s,opacity 0.25s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-mobile-menu{display:none;position:fixed;top:57px;left:0;right:0;background:rgba(8,11,10,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--muted-3);padding:1.5rem 1.25rem;z-index:99;flex-direction:column;}
.nav-mobile-menu.open{display:flex;}
.nav-mobile-menu a{color:var(--muted-1);text-decoration:none;font-size:1rem;padding:0.9rem 0;border-bottom:1px solid var(--muted-3);transition:color 0.2s;}
.nav-mobile-menu a:last-child{border-bottom:none;}
.page-header{padding:8rem 2.5rem 3rem;max-width:1200px;margin:0 auto;}

.eyebrow-line{width:28px;height:1px;background:var(--green);}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:0.75rem;}
.page-header h1 em{font-style:italic;color:var(--green);}
.page-header p{color:var(--muted-1);font-size:0.95rem;font-weight:300;max-width:560px;line-height:1.7;}

.search-box{position:relative;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--muted-3);border-radius:12px;padding:1rem 1.25rem 1rem 3rem;color:var(--white);font-family:'Outfit',sans-serif;font-size:1rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.search-box input::placeholder{color:var(--muted-2);}
.search-box input:focus{border-color:var(--green-border);box-shadow:0 0 0 3px var(--green-glow);}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted-2);font-size:1rem;pointer-events:none;}
.search-count{font-size:0.78rem;color:var(--muted-2);margin-top:0.6rem;padding-left:0.25rem;}
.alpha-nav{max-width:1200px;margin:0 auto;padding:0 2.5rem 2.5rem;}
.alpha-nav-inner{display:flex;flex-wrap:wrap;gap:0.4rem;}

.alpha-btn:hover{border-color:var(--green-border);color:var(--green);}
.alpha-btn.disabled{opacity:0.25;cursor:default;pointer-events:none;}
.glossary-wrapper{max-width:1200px;margin:0 auto;padding:0 2.5rem 6rem;}
.letter-section{margin-bottom:3.5rem;}
.letter-anchor{display:block;position:relative;top:-100px;visibility:hidden;}
.letter-heading{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:var(--muted-3);line-height:1;margin-bottom:1.5rem;letter-spacing:-2px;}
.terms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--muted-3);border:1px solid var(--muted-3);border-radius:12px;overflow:hidden;}
.term-card{background:var(--bg-card);padding:1.5rem 2rem;transition:background 0.2s;}
.term-card:hover{background:var(--bg-hover);}
.term-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--white);margin-bottom:0.5rem;letter-spacing:-0.3px;}
.term-category{display:inline-block;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:0.6rem;}
.term-def{color:var(--muted-1);font-size:0.875rem;line-height:1.7;font-weight:300;}
.term-example{margin-top:0.6rem;font-size:0.8rem;color:var(--muted-2);font-style:italic;line-height:1.6;}
.term-link{display:inline-flex;align-items:center;gap:0.3rem;margin-top:0.75rem;font-size:0.75rem;color:var(--green);text-decoration:none;opacity:0.8;transition:opacity 0.2s;}
.term-link:hover{opacity:1;}
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted-2);}
.no-results-title{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem;color:var(--muted-1);}
footer{border-top:1px solid var(--muted-3);padding:2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;max-width:1200px;margin:0 auto;}
.footer-links{display:flex;gap:1.5rem;}
.footer-links a{color:var(--muted-2);text-decoration:none;font-size:0.8rem;transition:color 0.2s;}
.footer-links a:hover{color:var(--green);}
.footer-copy{color:var(--muted-2);font-size:0.75rem;}
@media(max-width:768px){
  nav{padding:1rem 1.25rem;}.nav-links{display:none;}.nav-hamburger{display:flex;}

  .letter-heading{font-size:2rem;}
  footer{flex-direction:column;align-items:flex-start;padding:2rem 1.25rem;}.footer-links{flex-wrap:wrap;gap:1rem;}
}

<body>

<div id="site-header"></div>

<div class="page-header">
  <div class="page-eyebrow"><div class="eyebrow-line"></div>Referência</div>
  <h1>Glossário <em>Financeiro</em></h1>
  <p>Os termos mais importantes do mundo financeiro explicados em linguagem simples, sem jargões desnecessários.</p>
</div>

<div class="search-wrapper">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar termo... ex: CDI, volatilidade, aporte">
  </div>
  <div class="search-count" id="searchCount"></div>
</div>

<div class="alpha-nav">
  <div class="alpha-nav-inner" id="alphaNav"></div>
</div>

<div class="glossary-wrapper">
  <div id="glossaryContent"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <div class="no-results-title">Nenhum termo encontrado</div>
    <div>Tente buscar por outra palavra</div>
  </div>
</div>

<div id="site-footer"></div>

<script>
  

  const termos=[
    {letra:'A',nome:'Aporte',categoria:'Fundamentos',def:'Valor investido periodicamente, seja de forma mensal, trimestral ou anual. Quanto maior e mais frequente o aporte, maior o patrimônio acumulado ao longo do tempo.',exemplo:'Investir R$ 500 todo mês em um fundo é fazer aportes mensais de R$ 500.'},
    {letra:'A',nome:'ATM (At The Money)',categoria:'Opções',def:'Classificação de uma opção cujo preço de exercício (strike) é igual ou muito próximo ao preço atual do ativo subjacente.',exemplo:'Se a ação vale R$ 25 e o strike da opção é R$ 25, ela está ATM.',link:'/calculadoras/derivativos/'},
    {letra:'B',nome:'Black-Scholes',categoria:'Opções',def:'Modelo matemático para precificação de opções financeiras, desenvolvido por Fischer Black e Myron Scholes em 1973. É a referência global para cálculo do preço justo de opções.',exemplo:'Uma call com ação a R$ 25, volatilidade de 30% e vencimento em 30 dias vale R$ 1,25 pelo modelo Black-Scholes.',link:'/calculadoras/derivativos/'},
    {letra:'C',nome:'Call',categoria:'Opções',def:'Opção de compra. Dá ao titular o direito, mas não a obrigação, de comprar um ativo a um preço predeterminado (strike) até a data de vencimento.',exemplo:'Comprar uma call de PETR4 com strike R$ 30 dá o direito de comprar PETR4 por R$ 30, independente do preço de mercado.',link:'/calculadoras/derivativos/'},
    {letra:'C',nome:'Capital',categoria:'Fundamentos',def:'Valor inicial disponível para investimento ou o patrimônio total acumulado. É a base sobre a qual os juros incidem.',exemplo:'Aplicar R$ 10.000 em um CDB significa que o capital inicial é R$ 10.000.'},
    {letra:'C',nome:'Capitalização',categoria:'Fundamentos',def:'Processo de incorporação dos juros ao capital, que passa a render sobre o novo total. Na capitalização composta, os juros rendem juros.',exemplo:'R$ 1.000 a 1% ao mês: após o 1º mês vira R$ 1.010 e o 2º mês rende sobre R$ 1.010, não sobre R$ 1.000.'},
    {letra:'C',nome:'CDI',categoria:'Indicadores',def:'Certificado de Depósito Interbancário. Taxa de juros usada como referência para a maioria dos investimentos de renda fixa no Brasil. Fica muito próxima à taxa Selic.',exemplo:'Um CDB que rende 100% do CDI acompanha de perto a taxa básica de juros da economia.'},
    {letra:'C',nome:'CDB',categoria:'Investimentos',def:'Certificado de Depósito Bancário. Título emitido por bancos para captar recursos. O investidor empresta dinheiro ao banco e recebe juros em troca.',exemplo:'CDB do Banco XYZ a 110% do CDI por 1 ano: o investidor recebe 110% da variação do CDI no período.'},
    {letra:'D',nome:'Diversificação',categoria:'Investimentos',def:'Estratégia de distribuir investimentos entre diferentes ativos para reduzir o risco. Se um ativo cai, os outros podem compensar.',exemplo:'Investir em ações, renda fixa e fundos imobiliários ao mesmo tempo é diversificar.'},
    {letra:'D',nome:'Dividend Yield',categoria:'Investimentos',def:'Percentual dos dividendos pagos por uma empresa em relação ao preço da ação. Indica o retorno em proventos de um investimento.',exemplo:'Ação a R$ 20 que paga R$ 2 de dividendos por ano tem Dividend Yield de 10%.'},
    {letra:'F',nome:'FIRE',categoria:'Planejamento',def:'Financial Independence, Retire Early — movimento que propõe acumular patrimônio suficiente para viver dos rendimentos e se aposentar muito antes da idade convencional.',exemplo:'Acumular R$ 1,5 milhão investido a 4% a.a. de retorno real gera R$ 5.000/mês — princípio básico do FIRE.',link:'/calculadoras/simulador-aposentadoria/'},
    {letra:'F',nome:'FII',categoria:'Investimentos',def:'Fundo de Investimento Imobiliário. Fundo que investe em imóveis ou títulos do setor imobiliário. Distribui rendimentos mensais isentos de IR para pessoas físicas.',exemplo:'XPML11 é um FII de shopping centers que distribui rendimentos mensais aos cotistas.'},
    {letra:'I',nome:'IGP-M',categoria:'Indicadores',def:'Índice Geral de Preços do Mercado. Índice de inflação calculado pela FGV, muito utilizado em reajustes de contratos de aluguel.',exemplo:'Um contrato de aluguel reajustado pelo IGP-M de 8% ao ano aumenta de R$ 1.000 para R$ 1.080.'},
    {letra:'I',nome:'INSS',categoria:'Planejamento',def:'Instituto Nacional do Seguro Social. Órgão responsável pela previdência social pública no Brasil. Os trabalhadores contribuem mensalmente e têm direito à aposentadoria.',exemplo:'Um trabalhador CLT que contribui por 35 anos pode solicitar aposentadoria por tempo de contribuição.'},
    {letra:'I',nome:'IPCA',categoria:'Indicadores',def:'Índice de Preços ao Consumidor Amplo. Índice oficial de inflação do Brasil, calculado pelo IBGE. É o termômetro da inflação para o público em geral.',exemplo:'IPCA de 4,5% ao ano significa que uma cesta de produtos que custava R$ 1.000 passou a custar R$ 1.045.'},
    {letra:'I',nome:'ITM (In The Money)',categoria:'Opções',def:'Opção com valor intrínseco positivo. Uma call está ITM quando o preço da ação está acima do strike. Uma put está ITM quando o preço está abaixo do strike.',exemplo:'Call com strike R$ 25 e ação a R$ 28 está ITM — tem valor intrínseco de R$ 3.',link:'/calculadoras/derivativos/'},
    {letra:'I',nome:'Independência Financeira',categoria:'Planejamento',def:'Estado em que o patrimônio acumulado gera renda passiva suficiente para cobrir todos os gastos, sem necessidade de trabalhar por renda ativa.',link:'/calculadoras/simulador-aposentadoria/'},
    {letra:'J',nome:'Juros Compostos',categoria:'Fundamentos',def:'Regime de juros em que os rendimentos são incorporados ao capital e passam a render juros também — o famoso "juros sobre juros". Gera crescimento exponencial ao longo do tempo.',exemplo:'R$ 1.000 a 1% ao mês: em 10 anos vira R$ 3.300. Com juros simples seria apenas R$ 2.200.',link:'/calculadoras/juros-compostos/'},
    {letra:'J',nome:'Juros Simples',categoria:'Fundamentos',def:'Regime de juros em que os rendimentos são calculados sempre sobre o capital inicial, sem incorporação ao montante. Gera crescimento linear.',exemplo:'R$ 1.000 a 10% ao ano em juros simples: rende sempre R$ 100/ano, independente do tempo.'},
    {letra:'L',nome:'LCI / LCA',categoria:'Investimentos',def:'Letra de Crédito Imobiliário e do Agronegócio. Títulos emitidos por bancos com isenção de IR para pessoas físicas. Geralmente rendem um percentual do CDI.',exemplo:'LCI a 92% do CDI isenta de IR pode ser mais rentável que um CDB a 100% do CDI tributado.'},
    {letra:'L',nome:'Liquidez',categoria:'Fundamentos',def:'Facilidade e velocidade com que um ativo pode ser convertido em dinheiro sem perda significativa de valor.',exemplo:'A poupança tem liquidez diária — você pode sacar a qualquer momento. Um imóvel tem baixa liquidez.'},
    {letra:'M',nome:'Montante',categoria:'Fundamentos',def:'Valor total acumulado ao final de um período de investimento, incluindo o capital inicial e todos os juros incorporados.',exemplo:'R$ 1.000 investidos a 10% ao ano por 3 anos têm montante de R$ 1.331.'},
    {letra:'O',nome:'OTM (Out of The Money)',categoria:'Opções',def:'Opção sem valor intrínseco. Uma call está OTM quando o strike é maior que o preço da ação. Uma put está OTM quando o strike é menor que o preço.',exemplo:'Call com strike R$ 30 e ação a R$ 25 está OTM — não faz sentido exercê-la agora.',link:'/calculadoras/derivativos/'},
    {letra:'P',nome:'PGBL / VGBL',categoria:'Planejamento',def:'Planos de previdência privada. O PGBL permite deduzir contribuições no IR (indicado para quem faz declaração completa). O VGBL não permite dedução, mas o IR incide só sobre os rendimentos.'},
    {letra:'P',nome:'Previdência Privada',categoria:'Planejamento',def:'Plano de acumulação de longo prazo com benefícios fiscais, complementar à previdência pública (INSS). Permite acumular patrimônio para a aposentadoria.'},
    {letra:'P',nome:'Put',categoria:'Opções',def:'Opção de venda. Dá ao titular o direito, mas não a obrigação, de vender um ativo a um preço predeterminado (strike) até a data de vencimento.',exemplo:'Comprar uma put de PETR4 com strike R$ 25 protege o investidor caso a ação caia abaixo de R$ 25.',link:'/calculadoras/derivativos/'},
    {letra:'R',nome:'Renda Fixa',categoria:'Investimentos',def:'Classe de investimentos com regras de remuneração definidas no momento da aplicação. O investidor sabe previamente como será remunerado.',exemplo:'CDB, Tesouro Direto, LCI e LCA são exemplos de renda fixa.'},
    {letra:'R',nome:'Renda Variável',categoria:'Investimentos',def:'Classe de investimentos sem remuneração predefinida. O retorno depende do desempenho do ativo no mercado.',exemplo:'Ações, fundos imobiliários e opções são exemplos de renda variável.'},
    {letra:'R',nome:'Rentabilidade',categoria:'Fundamentos',def:'Percentual de retorno de um investimento em relação ao capital aplicado em um determinado período.',exemplo:'Investir R$ 1.000 e resgatar R$ 1.120 representa rentabilidade de 12% no período.'},
    {letra:'S',nome:'Selic',categoria:'Indicadores',def:'Taxa básica de juros da economia brasileira, definida pelo Banco Central a cada 45 dias. Serve de referência para todos os outros juros da economia.',exemplo:'Com Selic a 13,75% ao ano, o Tesouro Selic rende aproximadamente esse percentual.'},
    {letra:'S',nome:'Strike',categoria:'Opções',def:'Preço de exercício de uma opção. É o preço pelo qual o titular pode comprar (call) ou vender (put) o ativo subjacente.',exemplo:'Uma call de PETR4 com strike R$ 30 permite comprar PETR4 por R$ 30, independente do preço de mercado.',link:'/calculadoras/derivativos/'},
    {letra:'T',nome:'Taxa Real',categoria:'Indicadores',def:'Taxa de juros descontada a inflação do período. Representa o ganho efetivo de poder de compra do investidor.',exemplo:'Investimento a 12% ao ano com inflação de 5%: taxa real ≈ 6,67% ao ano (fórmula de Fisher).',link:'/calculadoras/equivalencia-de-taxas/'},
    {letra:'T',nome:'Tesouro Direto',categoria:'Investimentos',def:'Programa do governo federal para venda de títulos públicos a pessoas físicas pela internet. É considerado o investimento mais seguro do Brasil.',exemplo:'Tesouro IPCA+ 2035 paga IPCA mais uma taxa prefixada, protegendo o investidor da inflação.'},
    {letra:'V',nome:'Valor Extrínseco',categoria:'Opções',def:'Parte do prêmio de uma opção que excede o valor intrínseco. Representa o valor do tempo e da incerteza. Vai a zero no vencimento.',exemplo:'Call com strike R$ 25, ação a R$ 27, prêmio R$ 2,80: valor intrínseco = R$ 2, extrínseco = R$ 0,80.',link:'/calculadoras/derivativos/'},
    {letra:'V',nome:'Valor Intrínseco',categoria:'Opções',def:'Parte do prêmio de uma opção que representa o ganho imediato se exercida agora. Para calls: max(S-K, 0). Para puts: max(K-S, 0).',exemplo:'Call com strike R$ 25 e ação a R$ 28 tem valor intrínseco de R$ 3.',link:'/calculadoras/derivativos/'},
    {letra:'V',nome:'Volatilidade',categoria:'Fundamentos',def:'Medida de quanto o preço de um ativo oscila ao longo do tempo. Alta volatilidade significa grandes variações de preço — maior risco e maior potencial de retorno.',exemplo:'Uma ação que varia 30% ao ano tem volatilidade bem maior que o Tesouro Selic, que é estável.',link:'/calculadoras/derivativos/'},
    {letra:'V',nome:'Volatilidade Implícita',categoria:'Opções',def:'Volatilidade futura esperada pelo mercado, extraída do preço das opções. Indica o "medo" ou expectativa de oscilação dos participantes do mercado.',link:'/calculadoras/derivativos/'},
  ];

  function agrupar(lista){
    const grupos={};
    lista.forEach(t=>{if(!grupos[t.letra])grupos[t.letra]=[];grupos[t.letra].push(t);});
    return grupos;
  }

  const todasLetras=[...new Set(termos.map(t=>t.letra))].sort();

  function renderAlphaNav(ativas){
    document.getElementById('alphaNav').innerHTML=todasLetras.map(l=>{
      const has=ativas.includes(l);
      return `<a href="#letra-${l}" class="alpha-btn ${has?'':'disabled'}" onclick="scrollToLetter('${l}');return false;">${l}</a>`;
    }).join('');
  }

  function scrollToLetter(l){
    const el=document.getElementById('letra-'+l);
    if(el) el.scrollIntoView({behavior:'smooth'});
  }

  function render(lista){
    const content=document.getElementById('glossaryContent');
    const noResults=document.getElementById('noResults');
    const countEl=document.getElementById('searchCount');
    const grupos=agrupar(lista);
    const letras=Object.keys(grupos).sort();
    if(lista.length===0){
      content.innerHTML='';noResults.style.display='block';countEl.textContent='';return;
    }
    noResults.style.display='none';
    countEl.textContent=lista.length+' termo'+(lista.length!==1?'s':'')+' encontrado'+(lista.length!==1?'s':'');
    content.innerHTML=letras.map(letra=>{
      const cards=grupos[letra].map(t=>`
        <div class="term-card">
          <div class="term-category">${t.categoria}</div>
          <div class="term-name">${t.nome}</div>
          <div class="term-def">${t.def}</div>
          ${t.exemplo?`<div class="term-example">Exemplo: ${t.exemplo}</div>`:''}
          ${t.link?`<a href="${t.link}" class="term-link">Ver calculadora →</a>`:''}
        </div>`).join('');
      return `<div class="letter-section"><span class="letter-anchor" id="letra-${letra}"></span><div class="letter-heading">${letra}</div><div class="terms-grid">${cards}</div></div>`;
    }).join('');
    renderAlphaNav(letras);
  }

  document.getElementById('searchInput').addEventListener('input',function(){
    const q=this.value.toLowerCase().trim();
    if(!q){render(termos);return;}
    render(termos.filter(t=>
      t.nome.toLowerCase().includes(q)||
      t.def.toLowerCase().includes(q)||
      t.categoria.toLowerCase().includes(q)||
      (t.exemplo&&t.exemplo.toLowerCase().includes(q))
    ));
  });

  render(termos);
</script>
<script src="/assets/js/components.js"></script>
</body>
</html>
