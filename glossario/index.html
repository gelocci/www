<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H3WXX5RDYY"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-H3WXX5RDYY');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelocci — Glossário Financeiro</title>
  <meta name="description" content="Glossário financeiro completo. Entenda os termos mais importantes do mundo dos investimentos em linguagem simples e direta.">
  <meta name="keywords" content="glossário financeiro, termos financeiros, investimentos, juros, renda fixa, opções">
  <meta name="author" content="Gerson Locci">
  <link rel="icon" href="../assets/imagens/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#00C853;--green-dim:#00A844;--green-glow:rgba(0,200,83,0.12);--green-border:rgba(0,200,83,0.22);--gold:#C9A84C;--bg:#080B0A;--bg-2:#0E1412;--bg-card:#111815;--bg-hover:#141C18;--white:#F0F4F2;--muted-1:rgba(240,244,242,0.65);--muted-2:rgba(240,244,242,0.40);--muted-3:rgba(240,244,242,0.12);--muted-4:rgba(240,244,242,0.05);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4;}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2.5rem;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,11,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--muted-3);}
.logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;color:var(--white);letter-spacing:-0.5px;display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
.logo-dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green);}50%{opacity:0.6;box-shadow:0 0 16px var(--green);}}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:var(--muted-1);text-decoration:none;font-size:0.875rem;transition:color 0.2s;}
.nav-links a:hover{color:var(--white);}
.nav-back{color:var(--muted-1);text-decoration:none;font-size:0.875rem;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;}
.nav-back:hover{color:var(--white);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:transform 0.25s,opacity 0.25s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-mobile-menu{display:none;position:fixed;top:57px;left:0;right:0;background:rgba(8,11,10,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--muted-3);padding:1.5rem 1.25rem;z-index:99;flex-direction:column;}
.nav-mobile-menu.open{display:flex;}
.nav-mobile-menu a{color:var(--muted-1);text-decoration:none;font-size:1rem;padding:0.9rem 0;border-bottom:1px solid var(--muted-3);transition:color 0.2s;}
.nav-mobile-menu a:last-child{border-bottom:none;}
.page-header{padding:8rem 2.5rem 3rem;max-width:1200px;margin:0 auto;}
.page-eyebrow{display:inline-flex;align-items:center;gap:0.6rem;font-size:0.75rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);margin-bottom:1.2rem;font-weight:500;}
.eyebrow-line{width:28px;height:1px;background:var(--green);}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:0.75rem;}
.page-header h1 em{font-style:italic;color:var(--green);}
.page-header p{color:var(--muted-1);font-size:0.95rem;font-weight:300;max-width:560px;line-height:1.7;}
.search-wrapper{max-width:1200px;margin:0 auto;padding:0 2.5rem 2rem;}
.search-box{position:relative;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--muted-3);border-radius:12px;padding:1rem 1.25rem 1rem 3rem;color:var(--white);font-family:'Outfit',sans-serif;font-size:1rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.search-box input::placeholder{color:var(--muted-2);}
.search-box input:focus{border-color:var(--green-border);box-shadow:0 0 0 3px var(--green-glow);}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted-2);font-size:1rem;pointer-events:none;}
.search-count{font-size:0.78rem;color:var(--muted-2);margin-top:0.6rem;padding-left:0.25rem;}
.alpha-nav{max-width:1200px;margin:0 auto;padding:0 2.5rem 2.5rem;}
.alpha-nav-inner{display:flex;flex-wrap:wrap;gap:0.4rem;}
.alpha-btn{background:none;border:1px solid var(--muted-3);color:var(--muted-2);font-family:'Outfit',sans-serif;font-size:0.8rem;font-weight:500;padding:0.35rem 0.65rem;border-radius:6px;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.alpha-btn:hover{border-color:var(--green-border);color:var(--green);}
.alpha-btn.disabled{opacity:0.25;cursor:default;pointer-events:none;}
.glossary-wrapper{max-width:1200px;margin:0 auto;padding:0 2.5rem 6rem;}
.letter-section{margin-bottom:3.5rem;}
.letter-anchor{display:block;position:relative;top:-100px;visibility:hidden;}
.letter-heading{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:var(--muted-3);line-height:1;margin-bottom:1.5rem;letter-spacing:-2px;}
.terms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--muted-3);border:1px solid var(--muted-3);border-radius:12px;overflow:hidden;}
.term-card{background:var(--bg-card);padding:1.5rem 2rem;transition:background 0.2s;}
.term-card:hover{background:var(--bg-hover);}
.term-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--white);margin-bottom:0.5rem;letter-spacing:-0.3px;}
.term-category{display:inline-block;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:0.6rem;}
.term-def{color:var(--muted-1);font-size:0.875rem;line-height:1.7;font-weight:300;}
.term-example{margin-top:0.6rem;font-size:0.8rem;color:var(--muted-2);font-style:italic;line-height:1.6;}
.term-link{display:inline-flex;align-items:center;gap:0.3rem;margin-top:0.75rem;font-size:0.75rem;color:var(--green);text-decoration:none;opacity:0.8;transition:opacity 0.2s;}
.term-link:hover{opacity:1;}
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted-2);}
.no-results-title{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem;color:var(--muted-1);}
footer{border-top:1px solid var(--muted-3);padding:2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;max-width:1200px;margin:0 auto;}
.footer-links{display:flex;gap:1.5rem;}
.footer-links a{color:var(--muted-2);text-decoration:none;font-size:0.8rem;transition:color 0.2s;}
.footer-links a:hover{color:var(--green);}
.footer-copy{color:var(--muted-2);font-size:0.75rem;}
@media(max-width:768px){
  nav{padding:1rem 1.25rem;}.nav-links{display:none;}.nav-hamburger{display:flex;}
  .page-header{padding:6rem 1.25rem 2rem;}
  .search-wrapper{padding:0 1.25rem 1.5rem;}
  .alpha-nav{padding:0 1.25rem 1.5rem;}
  .glossary-wrapper{padding:0 1.25rem 4rem;}
  .terms-grid{grid-template-columns:1fr;}
  .letter-heading{font-size:2rem;}
  footer{flex-direction:column;align-items:flex-start;padding:2rem 1.25rem;}.footer-links{flex-wrap:wrap;gap:1rem;}
}
</style>
</head>
<body>

<div id="site-header"></div>

<div class="page-header">
  <div class="page-eyebrow"><div class="eyebrow-line"></div>Referência</div>
  <h1>Glossário <em>Financeiro</em></h1>
  <p>Os termos mais importantes do mundo financeiro explicados em linguagem simples, sem jargões desnecessários.</p>
</div>

<div class="search-wrapper">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar termo... ex: CDI, volatilidade, aporte">
  </div>
  <div class="search-count" id="searchCount"></div>
</div>

<div class="alpha-nav">
  <div class="alpha-nav-inner" id="alphaNav"></div>
</div>

<div class="glossary-wrapper">
  <div id="glossaryContent"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <div class="no-results-title">Nenhum termo encontrado</div>
    <div>Tente buscar por outra palavra</div>
  </div>
</div>

<div id="site-footer"></div>


<script src="/assets/js/components.js"></script>
</body>
</html>
